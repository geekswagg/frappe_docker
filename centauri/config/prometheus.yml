global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: mariadb
    static_configs:
      - targets: [db-exporter:9104]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
